<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>__PROJECT_NAME__ — SURFIX Protected Script</title>

  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" href="data:,">

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, rgba(88, 28, 135, 0.2), #010101 80%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      padding: 2rem;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(124, 58, 237, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124, 58, 237, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .container {
      max-width: 520px;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .card {
      background: rgba(10, 10, 18, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 32px;
      padding: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 92, 246, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 35px 55px -15px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(139, 92, 246, 0.25);
    }

    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #7c3aed, #ec4899, #f472b6);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 20px -6px rgba(124, 58, 237, 0.4);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      background: linear-gradient(135deg, #ffffff, #c084fc, #f472b6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .badge {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .badge span {
      display: inline-block;
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 40px;
      padding: 0.25rem 1rem;
      font-size: 0.7rem;
      font-family: 'Space Mono', monospace;
      color: #c084fc;
      letter-spacing: 0.05em;
    }

    .description {
      text-align: center;
      color: #ffffff;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .code-block {
      background: #0a0a10;
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 20px;
      padding: 1.25rem;
      margin: 1.5rem 0;
      position: relative;
    }

    .code-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: #64748b;
    }

    .code-header .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff5f56;
    }
    .code-header .dot:nth-child(2) { background: #ffbd2e; }
    .code-header .dot:nth-child(3) { background: #27c93f; }

    code {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: #4ade80;
      word-break: break-all;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .copy-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 8px;
      padding: 0.25rem 0.6rem;
      font-size: 0.65rem;
      font-family: 'Space Mono', monospace;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .copy-btn:hover {
      background: rgba(139, 92, 246, 0.2);
      border-color: #8b5cf6;
      color: #c084fc;
    }

    .note {
      background: rgba(139, 92, 246, 0.05);
      border-radius: 16px;
      padding: 1rem;
      margin: 1rem 0;
      text-align: center;
      font-size: 0.75rem;
      font-family: 'Space Mono', monospace;
      color: #94a3b8;
    }

    .note a {
      color: #c084fc;
      text-decoration: none;
    }

    .note a:hover {
      text-decoration: underline;
    }

    .warning {
      text-align: center;
      font-size: 0.7rem;
      color: #64748b;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(139, 92, 246, 0.15);
    }

    @media (max-width: 480px) {
      .card { padding: 1.5rem; }
      h1 { font-size: 1.4rem; }
      code { font-size: 0.65rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <div class="logo-icon">🔒</div>
      </div>

      <h1>__PROJECT_NAME__</h1>
      
      <div class="badge">
        <span>✦ SURFIX PROTECTED ✦</span>
      </div>

      <p class="description">
        This Lua script is protected by SURFIX.
      </p>

      <div class="code-block">
        <div class="code-header">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <span style="margin-left: auto;">loader.lua</span>
        </div>
        <code id="loader-code">loadstring(game:HttpGet(""))()</code>
        <button class="copy-btn" onclick="copyLoaderUrl()">Copy</button>
      </div>

      <div class="note">
        <span>📜 Loadstring for Roblox/FiveM</span><br>
        __FFA_NOTE__
      </div>

      <div class="warning">
        ⚠️ Protected content — unauthorized access detected<br>
        Contents cannot be displayed in a browser • <a href="#">SURFIX</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const isAutomation = navigator.webdriver || /HeadlessChrome|PhantomJS|Playwright/.test(navigator.userAgent);
      if (isAutomation) {
        document.querySelector('.card').innerHTML = '<div style="text-align:center; padding:2rem;"><h1 style="color:#ff4444;">Access Restricted</h1><p>Automated browsers are not permitted.</p></div>';
        return;
      }

      document.addEventListener("keydown", function(e) {
        if (e.key === "F12" || (e.ctrlKey && e.shiftKey && ["I", "J"].includes(e.key)) || (e.ctrlKey && ["u", "s", "p"].includes(e.key))) {
          e.preventDefault();
        }
      });

      ["contextmenu", "copy", "cut", "paste", "selectstart", "dragstart"].forEach(evt =>
        document.addEventListener(evt, e => e.preventDefault())
      );

      const parts = __PARTS__;
      const loaderUrl = String.fromCharCode(...parts.map(p => parseInt(p, 16)));
      document.getElementById("loader-code").textContent = 'loadstring(game:HttpGet("' + loaderUrl + '"))()';
    })();

    function copyLoaderUrl() {
      const code = document.getElementById("loader-code").textContent;
      navigator.clipboard.writeText(code);
      const btn = document.querySelector(".copy-btn");
      const originalText = btn.textContent;
      btn.textContent = "✓ Copied!";
      setTimeout(() => { btn.textContent = originalText; }, 2000);
    }
  </script>
</body>
</html>
