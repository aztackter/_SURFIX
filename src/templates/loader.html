<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:radial-gradient(circle at 20% 30%,rgba(88,28,135,0.3),#010101 85%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;padding:1.5rem;position:relative;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,58,237,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.05) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;}
.container{max-width:560px;width:100%;position:relative;z-index:2;}
.card{background:rgba(8,8,16,0.92);backdrop-filter:blur(24px);border:1px solid rgba(139,92,246,0.4);border-radius:44px;padding:2.5rem 2rem;box-shadow:0 35px 55px -20px rgba(0,0,0,0.6),0 0 0 1px rgba(139,92,246,0.2);transition:transform 0.3s ease,box-shadow 0.3s ease;}

.logo{display:flex;justify-content:center;margin-bottom:1.5rem;}
.logo-icon{width:68px;height:68px;background:linear-gradient(135deg,#7c3aed,#ec4899,#f472b6);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 15px 30px -12px rgba(124,58,237,0.5);}
h1{font-size:2.1rem;font-weight:700;text-align:center;background:linear-gradient(135deg,#ffffff,#c084fc,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:0.75rem;letter-spacing:-0.02em;}
.badge{text-align:center;margin-bottom:1.5rem;}
.badge span{display:inline-block;background:rgba(139,92,246,0.2);border:1px solid rgba(139,92,246,0.45);border-radius:60px;padding:0.3rem 1.2rem;font-size:0.7rem;font-family:'Space Mono',monospace;color:#c084fc;letter-spacing:0.08em;font-weight:500;}
.description{text-align:center;color:#e2e8f0;font-size:0.95rem;line-height:1.6;margin-bottom:1.8rem;font-weight:400;}
.code-block{background:#020208;border:1px solid rgba(139,92,246,0.3);border-radius:28px;padding:1rem 1.2rem;margin:1.5rem 0;position:relative;}
.code-header{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.9rem;font-family:'Space Mono',monospace;font-size:0.7rem;color:#5b6e8c;}
.code-header .dot{width:11px;height:11px;border-radius:50%;background:#ff5f56;}
.code-header .dot:nth-child(2){background:#ffbd2e;}
.code-header .dot:nth-child(3){background:#27c93f;}
code{display:block;font-family:'Space Mono',monospace;font-size:0.78rem;color:#86efac;word-break:break-all;white-space:pre-wrap;line-height:1.55;padding-right:3rem;}
.copy-btn{position:absolute;top:0.9rem;right:1rem;background:rgba(255,255,255,0.05);border:1px solid rgba(139,92,246,0.4);border-radius:12px;padding:0.3rem 0.8rem;font-size:0.65rem;font-family:'Space Mono',monospace;color:#9ca3af;cursor:pointer;transition:all 0.2s ease;}
.copy-btn:hover{background:rgba(139,92,246,0.3);border-color:#8b5cf6;color:#c084fc;}
.note{background:rgba(139,92,246,0.1);border-radius:20px;padding:1rem 1.2rem;margin:1.2rem 0;text-align:center;font-size:0.75rem;font-family:'Space Mono',monospace;color:#a0aec0;border:1px solid rgba(139,92,246,0.2);}
.note a{color:#c084fc;text-decoration:none;}
.warning{text-align:center;font-size:0.68rem;color:#6b7a8f;margin-top:1.4rem;padding-top:1rem;border-top:1px solid rgba(139,92,246,0.2);}
@media(max-width:520px){.card{padding:1.6rem 1.2rem;}h1{font-size:1.5rem;}code{font-size:0.65rem;}.logo-icon{width:52px;height:52px;font-size:26px;}}
</style>
</head>
<body>
<div class="container">
<div class="card">
<div class="logo"><div class="logo-icon">🔒</div></div>
<h1>__PROJECT_NAME__</h1>
<div class="badge"><span>✦ SURFIX PROTECTED ✦</span></div>
<div class="description">This Lua script is protected by SURFIX.</div>
<div class="code-block">
<div class="code-header"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="margin-left:auto;">loader.lua</span></div>
<code id="loader-code">loadstring(game:HttpGet(""))()</code>
<button class="copy-btn" onclick="copyLoaderUrl()">Copy</button>
</div>
<div class="note"><span>📜 Loadstring for Roblox / FiveM</span><br>__FFA_NOTE__</div>
<div class="warning">⚠️ Protected content — unauthorized access detected<br>Contents cannot be displayed in a browser • <a href="#">SURFIX</a></div>
</div>
</div>
<script>
(function(){
if(navigator.webdriver||/HeadlessChrome|PhantomJS|Playwright/.test(navigator.userAgent)){
document.querySelector('.card').innerHTML='<div style="text-align:center;padding:2rem;"><h2 style="color:#ff6666;">Access Restricted</h2><p style="color:#aaa;">Automated browsers are not permitted.</p></div>';return;}
document.addEventListener("keydown",function(e){if(e.key==="F12"||(e.ctrlKey&&e.shiftKey&&["I","J"].includes(e.key))||(e.ctrlKey&&["u","s","p"].includes(e.key))){e.preventDefault();}});
["contextmenu","copy","cut","paste","selectstart","dragstart"].forEach(evt=>document.addEventListener(evt,e=>e.preventDefault()));
const parts=__PARTS__;
const loaderUrl=String.fromCharCode(...parts.map(p=>parseInt(p,16)));
document.getElementById("loader-code").textContent='loadstring(game:HttpGet("'+loaderUrl+'"))()';
})();
function copyLoaderUrl(){const code=document.getElementById("loader-code").textContent;navigator.clipboard.writeText(code);const btn=document.querySelector(".copy-btn");const original=btn.textContent;btn.textContent="✓ Copied!";setTimeout(()=>{btn.textContent=original;},2000);}
</script>
</body>
</html>
