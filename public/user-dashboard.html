<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SURFIX — My Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #01010c;
      font-family: 'Syne', sans-serif;
      color: #f2f2ff;
      padding: 2rem;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .logo-mark {
      width: 38px;
      height: 38px;
      border-radius: 13px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
    }
    .logo-name {
      font-size: 1.2rem;
      font-weight: 800;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .logout-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(124,58,237,0.3);
      padding: 8px 20px;
      border-radius: 40px;
      color: #f2f2ff;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .logout-btn:hover {
      border-color: #ec4899;
      background: rgba(236,72,153,0.1);
    }
    .card {
      background: rgba(5,5,20,0.76);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 {
      margin-bottom: 1rem;
      font-size: 1.2rem;
      color: #c084fc;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .project-item {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }
    .project-name {
      font-weight: 700;
      font-size: 1rem;
      word-break: break-all;
    }
    .project-meta {
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      margin-top: 0.25rem;
    }
    .project-actions {
      margin-top: 0.75rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    button {
      background: rgba(124,58,237,0.2);
      border: 1px solid rgba(124,58,237,0.3);
      padding: 6px 12px;
      border-radius: 8px;
      color: #f2f2ff;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    button:hover {
      background: rgba(124,58,237,0.4);
      border-color: #7c3aed;
    }
    .btn-danger {
      background: rgba(236,72,153,0.2);
      border-color: rgba(236,72,153,0.3);
    }
    .btn-danger:hover {
      background: rgba(236,72,153,0.4);
      border-color: #ec4899;
    }
    .loading {
      text-align: center;
      padding: 2rem;
      color: rgba(255,255,255,0.4);
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.open {
      display: flex;
    }
    .modal-content {
      background: rgba(5,5,20,0.97);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 24px;
      padding: 2rem;
      max-width: 550px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-content h3 {
      margin-bottom: 1rem;
      color: #c084fc;
    }
    .modal-content input, .modal-content textarea, .modal-content select {
      width: 100%;
      padding: 0.75rem;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 12px;
      color: white;
      margin-bottom: 1rem;
      font-family: inherit;
    }
    .modal-content label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
    }
    .modal-content input[type="checkbox"] {
      width: auto;
      margin-bottom: 0;
    }
    .modal-buttons {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1rem;
    }
    .keys-result {
      margin-top: 1rem;
    }
    .keys-result textarea {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: #4ade80;
    }
    @media (max-width: 768px) {
      body { padding: 1rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo" onclick="location.reload()">
      <div class="logo-mark"></div>
      <span class="logo-name">SURFIX</span>
    </div>
    <div class="user-info" id="user-info" style="cursor:pointer;">
      <div class="user-avatar" id="userAvatar"></div>
      <span id="userName"></span>
      <button class="logout-btn" id="logout-btn" style="margin-left:10px;">Sign Out</button>
    </div>
  </div>

  <div id="dashboardContent">
    <div class="card">
      <div class="card-header">
        <h2>My Projects</h2>
        <button id="newProjectBtn">+ New Project</button>
      </div>
      <div id="projectsList"><div class="loading">Loading projects...</div></div>
    </div>
  </div>
</div>

<div id="projectModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">New Project</h3>
    <input type="hidden" id="editProjectId">
    <input type="text" id="projectName" placeholder="Project Name">
    <input type="text" id="projectVersion" placeholder="Version" value="1.0.0">
    <select id="projectProtection">
      <option value="light">Light</option>
      <option value="medium">Medium</option>
      <option value="max" selected>Maximum</option>
    </select>
    <label><input type="checkbox" id="projectLightning"> Lightning Mode (faster, fewer checks)</label>
    <label><input type="checkbox" id="projectSilent"> Silent Mode (suppress console output)</label>
    <label><input type="checkbox" id="projectFFA"> FFA Mode (no license key required)</label>
    <label><input type="checkbox" id="projectObfuscate" checked> 🔒 Enable Obfuscation</label>
    <textarea id="projectScript" rows="8" placeholder="-- Paste your Lua script here&#10;print('Hello, World!')"></textarea>
    <div class="modal-buttons">
      <button onclick="closeProjectModal()">Cancel</button>
      <button onclick="saveProject()">Save</button>
    </div>
  </div>
</div>

<div id="keysModal" class="modal">
  <div class="modal-content">
    <h3>Generate License Keys</h3>
    <input type="hidden" id="keysProjectId">
    <input type="number" id="keyCount" placeholder="Number of keys (max 500)" value="1" min="1" max="500">
    <input type="number" id="keyExpiry" placeholder="Expires in days (optional)">
    <input type="number" id="keyMaxUses" placeholder="Max uses (optional)">
    <input type="text" id="keyNote" placeholder="Note (optional)">
    <div class="modal-buttons">
      <button onclick="closeKeysModal()">Cancel</button>
      <button onclick="generateKeys()">Generate</button>
    </div>
    <div id="keysResult" class="keys-result"></div>
  </div>
</div>

<div id="loaderModal" class="modal">
  <div class="modal-content">
    <h3>Loader URL</h3>
    <p style="margin-bottom: 0.5rem;">Share this URL with your users:</p>
    <div style="background: rgba(0,0,0,0.5); border-radius: 8px; padding: 0.75rem; word-break: break-all; font-family: monospace; margin-bottom: 1rem;" id="loaderUrlDisplay"></div>
    <p style="font-size: 0.75rem; color: rgba(255,255,255,0.5);">Users paste their license key in the loader script before running.</p>
    <div class="modal-buttons">
      <button onclick="copyLoaderUrl()">Copy URL</button>
      <button onclick="closeLoaderModal()">Close</button>
    </div>
  </div>
</div>

<script>
  let token = localStorage.getItem("sf_token");
  let currentUser = null;

  if (!token) {
    window.location.href = "/";
  }

  async function api(method, path, body) {
    const res = await fetch(path, {
      method,
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if (res.status === 401) {
      localStorage.removeItem("sf_token");
      window.location.href = "/";
      throw new Error("Unauthorized");
    }
    return res.json();
  }

  async function loadUser() {
    try {
      const user = await api("GET", "/api/user/me");
      currentUser = user;
      document.getElementById("userName").textContent = user.username;
      document.getElementById("userAvatar").textContent = user.username.charAt(0).toUpperCase();
    } catch (err) {
      console.error("Failed to load user:", err);
    }
  }

  async function loadProjects() {
    try {
      const projects = await api("GET", "/api/user/projects");
      const container = document.getElementById("projectsList");
      if (projects.length === 0) {
        container.innerHTML = '<div class="loading">No projects yet. Click "New Project" to get started.</div>';
        return;
      }
      container.innerHTML = projects.map(function(p) {
        return '<div class="project-item">' +
          '<div class="project-name">' + escapeHtml(p.name) + ' v' + p.version + '</div>' +
          '<div class="project-meta">Keys: ' + (p.key_count || 0) + ' | Auths: ' + (p.total_auths || 0) + ' | Level: ' + p.protection_level +
          (p.lightning ? ' | ⚡ Lightning' : '') + (p.silent ? ' | 🔇 Silent' : '') + (p.ffa ? ' | 🎯 FFA' : '') + (p.obfuscate === 0 ? ' | 📄 No Obfuscation' : ' | 🔒 Obfuscated') +
          '</div>' +
          '<div class="project-actions">' +
          '<button onclick="editProject(\'' + p.id + '\')">Edit</button>' +
          '<button onclick="showGenerateKeys(\'' + p.id + '\')">Generate Keys</button>' +
          '<button onclick="viewKeys(\'' + p.id + '\')">View Keys</button>' +
          '<button onclick="showLoaderUrl(\'' + p.id + '\')">Copy URL</button>' +
          '<button class="btn-danger" onclick="deleteProject(\'' + p.id + '\')">Delete</button>' +
          '</div>' +
          '</div>';
      }).join("");
    } catch (err) {
      console.error("Failed to load projects:", err);
      document.getElementById("projectsList").innerHTML = "<div class='loading'>Error loading projects. Please refresh.</div>";
    }
  }

  function escapeHtml(str) {
    if (!str) return "";
    var d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function openProjectModal() {
    document.getElementById("modalTitle").textContent = "New Project";
    document.getElementById("editProjectId").value = "";
    document.getElementById("projectName").value = "";
    document.getElementById("projectVersion").value = "1.0.0";
    document.getElementById("projectProtection").value = "max";
    document.getElementById("projectLightning").checked = false;
    document.getElementById("projectSilent").checked = false;
    document.getElementById("projectFFA").checked = false;
    document.getElementById("projectObfuscate").checked = true;
    document.getElementById("projectScript").value = "";
    document.getElementById("projectModal").classList.add("open");
  }

  function closeProjectModal() {
    document.getElementById("projectModal").classList.remove("open");
  }

  window.editProject = async function(id) {
    try {
      const projects = await api("GET", "/api/user/projects");
      const p = projects.find(function(p) { return p.id === id; });
      if (!p) return;
      document.getElementById("modalTitle").textContent = "Edit Project";
      document.getElementById("editProjectId").value = p.id;
      document.getElementById("projectName").value = p.name;
      document.getElementById("projectVersion").value = p.version;
      document.getElementById("projectProtection").value = p.protection_level;
      document.getElementById("projectLightning").checked = p.lightning === 1;
      document.getElementById("projectSilent").checked = p.silent === 1;
      document.getElementById("projectFFA").checked = p.ffa === 1;
      document.getElementById("projectObfuscate").checked = p.obfuscate !== 0;
      document.getElementById("projectScript").value = p.script || "";
      document.getElementById("projectModal").classList.add("open");
    } catch (err) {
      alert("Error loading project: " + err.message);
    }
  };

  window.saveProject = async function() {
    const id = document.getElementById("editProjectId").value;
    const data = {
      name: document.getElementById("projectName").value.trim(),
      version: document.getElementById("projectVersion").value.trim() || "1.0.0",
      protection_level: document.getElementById("projectProtection").value,
      lightning: document.getElementById("projectLightning").checked,
      silent: document.getElementById("projectSilent").checked,
      ffa: document.getElementById("projectFFA").checked,
      obfuscate: document.getElementById("projectObfuscate").checked,
      script: document.getElementById("projectScript").value
    };
    
    if (!data.name || !data.script) {
      alert("Name and script are required");
      return;
    }
    
    try {
      const url = id ? "/api/user/projects/" + id : "/api/user/projects";
      const method = id ? "PUT" : "POST";
      await api(method, url, data);
      closeProjectModal();
      loadProjects();
    } catch (err) {
      alert("Error saving project: " + err.message);
    }
  };

  let currentProjectId = null;

  window.showGenerateKeys = function(projectId) {
    currentProjectId = projectId;
    document.getElementById("keysProjectId").value = projectId;
    document.getElementById("keyCount").value = "1";
    document.getElementById("keyExpiry").value = "";
    document.getElementById("keyMaxUses").value = "";
    document.getElementById("keyNote").value = "";
    document.getElementById("keysResult").innerHTML = "";
    document.getElementById("keysModal").classList.add("open");
  };

  function closeKeysModal() {
    document.getElementById("keysModal").classList.remove("open");
  }

  window.generateKeys = async function() {
    const projectId = document.getElementById("keysProjectId").value;
    const count = parseInt(document.getElementById("keyCount").value) || 1;
    const expires_in_days = document.getElementById("keyExpiry").value ? parseInt(document.getElementById("keyExpiry").value) : undefined;
    const max_activations = document.getElementById("keyMaxUses").value ? parseInt(document.getElementById("keyMaxUses").value) : undefined;
    const note = document.getElementById("keyNote").value;
    
    try {
      const keys = await api("POST", "/api/user/projects/" + projectId + "/keys", { count: count, expires_in_days: expires_in_days, max_activations: max_activations, note: note });
      document.getElementById("keysResult").innerHTML = '<div style="margin-top: 1rem;">' +
        '<strong style="color: #4ade80;">✓ Generated ' + keys.length + ' key(s)</strong>' +
        '<textarea rows="5" style="width:100%; margin-top:0.5rem; background:#000; border:1px solid #333; color:#4ade80; padding:0.5rem; font-family:monospace; font-size:0.75rem;" readonly>' + keys.map(function(k) { return k.key; }).join("\n") + '</textarea>' +
        '<button onclick="copyKeys()" style="margin-top:0.5rem; width:100%;">Copy All</button>' +
        '</div>';
    } catch (err) {
      alert("Error generating keys: " + err.message);
    }
  };

  window.copyKeys = function() {
    var ta = document.querySelector("#keysResult textarea");
    if (ta) { ta.select(); document.execCommand("copy"); alert("Copied to clipboard!"); }
  };

  window.viewKeys = async function(projectId) {
    try {
      const keys = await api("GET", "/api/user/projects/" + projectId + "/keys");
      if (keys.length === 0) {
        alert("No keys for this project");
      } else {
        alert(keys.map(function(k) { return k.key_value + " (" + k.activations + "/" + (k.max_activations || "∞") + " uses, HWID: " + (k.hwid || "free") + ")"; }).join("\n"));
      }
    } catch (err) {
      alert("Error loading keys: " + err.message);
    }
  };

  window.showLoaderUrl = function(projectId) {
    var url = window.location.origin + "/api/loader/" + projectId + ".lua";
    document.getElementById("loaderUrlDisplay").textContent = url;
    document.getElementById("loaderModal").classList.add("open");
  };

  function closeLoaderModal() {
    document.getElementById("loaderModal").classList.remove("open");
  }

  window.copyLoaderUrl = function() {
    var url = document.getElementById("loaderUrlDisplay").textContent;
    navigator.clipboard.writeText(url);
    alert("Loader URL copied to clipboard!");
  };

  window.deleteProject = async function(id) {
    if (confirm("Delete this project and ALL its keys? This cannot be undone.")) {
      try {
        await api("DELETE", "/api/user/projects/" + id);
        loadProjects();
      } catch (err) {
        alert("Error deleting project: " + err.message);
      }
    }
  };

  function logout() {
    localStorage.removeItem("sf_token");
    window.location.href = "/";
  }

  document.getElementById("logout-btn").addEventListener("click", logout);
  document.getElementById("newProjectBtn").addEventListener("click", openProjectModal);
  document.getElementById("user-info").addEventListener("click", function() {
    location.reload();
  });

  async function init() {
    await loadUser();
    await loadProjects();
  }

  init();
</script>
</body>
</html>
