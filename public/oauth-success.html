<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signing you in… — SURFIX</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #01010c;
    color: #f2f2ff;
    font-family: 'Syne', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    flex-direction: column;
    gap: 1.2rem;
  }
  .ring {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(124,58,237,.2);
    border-top-color: #7c3aed;
    border-right-color: #22d3ee;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: rgba(255,255,255,.35); font-size: .85rem; letter-spacing: .04em; }
  .err { color: #f87171; font-size: .82rem; text-align: center; max-width: 320px; line-height: 1.5; }
</style>
</head>
<body>
<div class="ring" id="ring"></div>
<p id="msg">Signing you in…</p>

<script>
(async function () {
  try {
    // Exchange the httpOnly cookie for the JWT token
    const r = await fetch('/auth/oauth-token', {
      credentials: 'include' // needed to send the httpOnly cookie
    });
    const data = await r.json();

    if (data.token) {
      localStorage.setItem('sf_token', data.token);
      window.location.replace('/');
    } else {
      showError(data.error || 'Sign-in failed. Please try again.');
    }
  } catch (err) {
    showError('Network error. Please try again.');
  }
})();

function showError(msg) {
  document.getElementById('ring').style.display = 'none';
  document.getElementById('msg').style.display  = 'none';
  const div = document.createElement('div');
  div.className = 'err';
  div.textContent = msg;
  const btn = document.createElement('button');
  btn.textContent = '← Back to home';
  btn.onclick = () => window.location.replace('/');
  btn.style.cssText = 'margin-top:1rem;background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.4);color:#c084fc;padding:10px 24px;border-radius:40px;cursor:pointer;font-size:.82rem;';
  document.body.appendChild(div);
  document.body.appendChild(btn);
}
</script>
</body>
</html>
