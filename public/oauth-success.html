<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signing you in… — SURFIX</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #01010c;
    color: #f2f2ff;
    font-family: 'Syne', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    flex-direction: column;
    gap: 1.2rem;
  }
  .ring {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(124,58,237,.2);
    border-top-color: #7c3aed;
    border-right-color: #22d3ee;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: rgba(255,255,255,.35); font-size: .85rem; letter-spacing: .04em; }
  .err { color: #f87171; font-size: .82rem; text-align: center; max-width: 320px; line-height: 1.5; }
</style>
</head>
<body>
<div class="ring"></div>
<p id="msg">Signing you in…</p>

<script>
(function () {
  var urlParams = new URLSearchParams(window.location.search);
  var token = urlParams.get('token');
  var error = urlParams.get('auth_error');

  if (error) {
    showError(error === 'google_failed' ? 'Google login failed. Please try again.' : 
               error === 'github_failed' ? 'GitHub login failed. Please try again.' : 
               'Login failed. Please try again.');
    return;
  }

  if (token) {
    localStorage.setItem('sf_token', token);
    window.location.replace('/');
  } else {
    // Try to fetch from the exchange endpoint as fallback
    fetch('/auth/oauth-token', { credentials: 'include' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.token) {
          localStorage.setItem('sf_token', data.token);
          window.location.replace('/');
        } else {
          showError('No token received. Please try logging in again.');
        }
      })
      .catch(function() {
        showError('Failed to complete login. Please try again.');
      });
  }

  function showError(msg) {
    document.querySelector('.ring').style.display = 'none';
    document.getElementById('msg').style.display = 'none';
    var div = document.createElement('div');
    div.className = 'err';
    div.textContent = msg;
    var btn = document.createElement('button');
    btn.textContent = '← Back to home';
    btn.onclick = function() { window.location.replace('/'); };
    btn.style.cssText = 'margin-top:1rem;background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.4);color:#c084fc;padding:10px 24px;border-radius:40px;cursor:pointer;font-size:.82rem;';
    document.body.appendChild(div);
    document.body.appendChild(btn);
  }
})();
</script>
</body>
</html>
